name: Build Android APK

on:
  # 手动触发（手机浏览器 GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:
  # 推送到 main 时自动构建
  push:
    branches: [main]
    paths:
      - 'console/**'
      - 'apk-build/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Install Capacitor dependencies
        working-directory: apk-build
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p apk-build/www
          cp -r console/* apk-build/www/
          # 确保入口文件为 index.html
          if [ ! -f apk-build/www/index.html ]; then
            cp console/gitcast-console.html apk-build/www/index.html
          fi

      - name: Create Capacitor Android project
        working-directory: apk-build
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate app icons
        working-directory: apk-build
        run: |
          python3 -c "
          from PIL import Image
          import os
          src = 'www/icons/icon-512.png'
          if not os.path.exists(src):
              print('No icon source, skipping')
              exit(0)
          img = Image.open(src).convert('RGBA')
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          res = 'android/app/src/main/res'
          for folder, size in sizes.items():
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(os.path.join(res, folder, 'ic_launcher.png'))
              resized.save(os.path.join(res, folder, 'ic_launcher_round.png'))
          print('Icons generated')
          "
        continue-on-error: true

      - name: Allow cleartext HTTP traffic
        working-directory: apk-build
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          XMLEOF
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        working-directory: apk-build/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp apk-build/android/app/build/outputs/apk/debug/app-debug.apk GitCast.apk
          ls -lh GitCast.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitCast-APK
          path: GitCast.apk
          retention-days: 30
