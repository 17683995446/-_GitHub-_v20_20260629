# Prometheus 监控配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "gitcast-monitor"

rule_files:
  - "alerts.yml"

scrape_configs:
  # GitCast API 指标
  - job_name: "gitcast-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "gitcast-api"

  # PostgreSQL 指标（需安装 postgres_exporter）
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  # Redis 指标（需安装 redis_exporter）
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # n8n 指标
  - job_name: "n8n"
    static_configs:
      - targets: ["n8n:5678"]
        labels:
          service: "n8n"
